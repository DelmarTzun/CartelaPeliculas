<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cartelera de Películas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="hero text-white text-center py-5">
    <div class="container">
      <h1 class="display-4 fw-bold mb-2">
        <i class="bi bi-film me-2"></i>Cartelera
      </h1>
      <p class="lead mb-0 opacity-75">Encuentra qué ver y dónde verlo</p>
    </div>
  </header>

  <main class="container py-4">
    <section class="filters card shadow-sm border-0 mb-4">
      <div class="card-body">
        <div class="row g-3 align-items-end">
          <div class="col-md-5">
            <label for="filtroUbicacion" class="form-label fw-semibold">
              <i class="bi bi-geo-alt me-1"></i>Ubicación
            </label>
            <select id="filtroUbicacion" class="form-select">
              <option value="">Todas las ubicaciones</option>
            </select>
          </div>
          <div class="col-md-5">
            <label for="busqueda" class="form-label fw-semibold">
              <i class="bi bi-search me-1"></i>Buscar
            </label>
            <input type="search" id="busqueda" class="form-control" placeholder="Título, género o descripción...">
          </div>
          <div class="col-md-2">
            <button type="button" id="btnLimpiar" class="btn btn-outline-secondary w-100">
              <i class="bi bi-x-circle me-1"></i>Limpiar
            </button>
          </div>
        </div>
        <p id="contador" class="text-muted small mb-0 mt-3"></p>
      </div>
    </section>

    <div id="loading" class="text-center py-5">
      <div class="spinner-border text-danger" role="status">
        <span class="visually-hidden">Cargando...</span>
      </div>
      <p class="mt-3 text-muted">Cargando cartelera...</p>
    </div>

    <div id="error" class="alert alert-danger d-none" role="alert"></div>

    <div id="cartelera" class="row g-4"></div>

    <div id="sinResultados" class="text-center py-5 d-none">
      <i class="bi bi-emoji-frown display-4 text-muted"></i>
      <p class="mt-3 text-muted">No hay películas con los filtros seleccionados.</p>
    </div>
  </main>

  <footer class="text-center text-muted py-4 border-top">
    <small>Cartelera &copy; 2025</small>
  </footer>

  <div class="modal fade" id="modalPelicula" tabindex="-1" aria-labelledby="modalTitulo" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content border-0 shadow">
        <div class="modal-header border-0">
          <h5 class="modal-title fw-bold" id="modalTitulo"></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body pt-0" id="modalCuerpo"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
